name: On-release

on:
  release:
    types: [published]

permissions:
  contents: read

concurrency:
  group: on-release

jobs:
  build:
    name: Build Distribution
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        path: ${{ github.repository }}
        persist-credentials: false
    - name: Clone internal dependencies
      if: ${{ env.INTERNAL_DEPENDENCIES != '' }}
      uses: bopen/ci-cd/git-clone@16f4e994b7dcd8d0abc40bc24a3a8842a678ae00 # v1.1
      with:
        repo-list: ${{ env.INTERNAL_DEPENDENCIES }}
        git-pat: ${{ secrets.GH_REPO_READ_TOKEN }}
        default-repo-ref: ${{ env.TARGET_BRANCH }}
    - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      with:
        enable-cache: false

    - name: Building the distribution and verify import
      working-directory: ${{ github.repository }}
      run: make build
    - name: Upload distribution
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: dist
        path: ${{ github.repository }}/dist/

  publish:
    name: Publish to PyPI
    needs: build
    if: 'true' # Enable/disable PyPI publishing
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      attestations: write
    environment:
      name: testpypi
      url: https://test.pypi.org/p/test-package-malmans2
    steps:
    - name: Download distribution
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c   # v8.0.1
      with:
        name: dist
        path: dist/
    - name: Attest build provenance
      uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32   # v4.1.0
      with:
        subject-path: dist/*
    - name: Publish package distributions to TestPyPI
      uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e
      with:
        repository-url: https://test.pypi.org/legacy/
        verbose: true

  docs-build:
    name: Build Documentation
    runs-on: ubuntu-latest
    if: 'false' # Enable/disable GitHub Pages deployment
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        path: ${{ github.repository }}
        persist-credentials: false
    - name: Clone internal dependencies
      if: ${{ env.INTERNAL_DEPENDENCIES != '' }}
      uses: bopen/ci-cd/git-clone@16f4e994b7dcd8d0abc40bc24a3a8842a678ae00 # v1.1
      with:
        repo-list: ${{ env.INTERNAL_DEPENDENCIES }}
        git-pat: ${{ secrets.GH_REPO_READ_TOKEN }}
        default-repo-ref: ${{ env.TARGET_BRANCH }}
    - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      with:
        enable-cache: false

    - name: Build the Sphinx documentation
      working-directory: ${{ github.repository }}
      run: make docs-build
    - uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5.0.0
    - uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4.0.0
      with:
        path: ${{ github.repository }}/docs/_build/html/

  docs-deploy:
    name: Deploy Documentation
    needs: docs-build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
    - uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e   # v4.0.5
      id: deployment
